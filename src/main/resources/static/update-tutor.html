<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Update Tutor</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            margin: 0;
            padding: 0;
        }

        .container {
            width: 500px;
            margin: 50px auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.15);
        }

        h2 {
            text-align: center;
        }

        label {
            display: block;
            margin-top: 12px;
            font-weight: bold;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            margin-top: 20px;
            padding: 12px;
            background: #16a34a;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #15803d;
        }

        .links {
            text-align: center;
            margin-top: 15px;
        }

        .links a {
            text-decoration: none;
            color: #2563eb;
        }

        #message {
            margin-top: 15px;
            text-align: center;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Update Tutor</h2>

    <form id="updateTutorForm">
        <label>Tutor ID</label>
        <input type="number" id="tutorId" required>

        <label>Name</label>
        <input type="text" id="name" required>

        <label>Email</label>
        <input type="email" id="email" required>

        <label>Phone</label>
        <input type="text" id="phone" required>

        <label>Subject</label>
        <input type="text" id="subject" required>

        <label>Qualification</label>
        <input type="text" id="qualification" required>

        <label>Experience Years</label>
        <input type="number" id="experienceYears" required>

        <label>Hourly Rate</label>
        <input type="number" id="hourlyRate" required>

        <label>Availability</label>
        <input type="text" id="availability" required>

        <label>Tutor Type</label>
        <select id="tutorType" required>
            <option value="">Select Type</option>
            <option value="Online">Online</option>
            <option value="Home Visit">Home Visit</option>
            <option value="Hybrid">Hybrid</option>
        </select>

        <button type="submit">Update Tutor</button>
    </form>

    <p id="message"></p>

    <div class="links">
        <a href="view-tutors.html">Back to Tutor List</a>
    </div>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const tutorIdFromUrl = params.get("id");

    if (tutorIdFromUrl) {
        document.getElementById("tutorId").value = tutorIdFromUrl;
        loadTutor(tutorIdFromUrl);
    }

    function loadTutor(id) {
        fetch("http://localhost:8080/tutors/" + id)
            .then(response => {
                if (!response.ok) {
                    throw new Error("Tutor not found");
                }
                return response.json();
            })
            .then(tutor => {
                document.getElementById("name").value = tutor.name;
                document.getElementById("email").value = tutor.email;
                document.getElementById("phone").value = tutor.phone;
                document.getElementById("subject").value = tutor.subject;
                document.getElementById("qualification").value = tutor.qualification;
                document.getElementById("experienceYears").value = tutor.experienceYears;
                document.getElementById("hourlyRate").value = tutor.hourlyRate;
                document.getElementById("availability").value = tutor.availability;
                document.getElementById("tutorType").value = tutor.tutorType;
            })
            .catch(error => {
                document.getElementById("message").style.color = "red";
                document.getElementById("message").innerText = "Tutor not found.";
            });
    }

    document.getElementById("updateTutorForm").addEventListener("submit", function(event) {
        event.preventDefault();

        const tutorId = document.getElementById("tutorId").value;

        const tutor = {
            name: document.getElementById("name").value,
            email: document.getElementById("email").value,
            phone: document.getElementById("phone").value,
            subject: document.getElementById("subject").value,
            qualification: document.getElementById("qualification").value,
            experienceYears: parseInt(document.getElementById("experienceYears").value),
            hourlyRate: parseFloat(document.getElementById("hourlyRate").value),
            availability: document.getElementById("availability").value,
            tutorType: document.getElementById("tutorType").value
        };

        fetch("http://localhost:8080/tutors/" + tutorId, {
            method: "PUT",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(tutor)
        })
        .then(response => {
            if (!response.ok) {
                throw new Error("Failed to update tutor");
            }
            return response.json();
        })
        .then(data => {
            document.getElementById("message").style.color = "green";
            document.getElementById("message").innerText = "Tutor updated successfully!";
        })
        .catch(error => {
            document.getElementById("message").style.color = "red";
            document.getElementById("message").innerText = "Error updating tutor.";
        });
    });
</script>

</body>
</html>
