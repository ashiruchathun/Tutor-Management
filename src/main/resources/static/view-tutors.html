<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>View Tutors</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            margin: 0;
            padding: 0;
        }

        .container {
            width: 95%;
            margin: 30px auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.15);
        }

        h2 {
            text-align: center;
            color: #222;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            gap: 10px;
            flex-wrap: wrap;
        }

        .search-box {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        input, select {
            padding: 10px;
        }

        button, a.button {
            padding: 10px 14px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
            color: white;
            font-size: 14px;
        }

        .add-btn {
            background: #2563eb;
        }

        .search-btn {
            background: #16a34a;
        }

        .reset-btn {
            background: #6b7280;
        }

        .update-btn {
            background: #f59e0b;
        }

        .delete-btn {
            background: #dc2626;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: center;
        }

        th {
            background: #111827;
            color: white;
        }

        tr:nth-child(even) {
            background: #f9fafb;
        }

        #message {
            text-align: center;
            font-weight: bold;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Tutor List</h2>

    <div class="top-bar">
        <a class="button add-btn" href="add-tutor.html">Add New Tutor</a>

        <div class="search-box">
            <select id="searchType">
                <option value="all">All Tutors</option>
                <option value="name">Search by Name</option>
                <option value="subject">Search by Subject</option>
                <option value="type">Search by Tutor Type</option>
            </select>

            <input type="text" id="searchValue" placeholder="Enter search value">

            <button class="search-btn" onclick="searchTutors()">Search</button>
            <button class="reset-btn" onclick="loadTutors()">Reset</button>
        </div>
    </div>

    <table>
        <thead>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Email</th>
            <th>Phone</th>
            <th>Subject</th>
            <th>Qualification</th>
            <th>Experience</th>
            <th>Hourly Rate</th>
            <th>Availability</th>
            <th>Tutor Type</th>
            <th>Actions</th>
        </tr>
        </thead>

        <tbody id="tutorTableBody">
        </tbody>
    </table>

    <p id="message"></p>
</div>

<script>
    window.onload = loadTutors;

    function loadTutors() {
        document.getElementById("searchType").value = "all";
        document.getElementById("searchValue").value = "";

        fetch("http://localhost:8080/tutors")
            .then(response => response.json())
            .then(data => displayTutors(data))
            .catch(error => {
                document.getElementById("message").style.color = "red";
                document.getElementById("message").innerText = "Error loading tutors.";
            });
    }

    function searchTutors() {
        const searchType = document.getElementById("searchType").value;
        const searchValue = document.getElementById("searchValue").value.trim();

        if (searchType === "all") {
            loadTutors();
            return;
        }

        if (searchValue === "") {
            document.getElementById("message").style.color = "red";
            document.getElementById("message").innerText = "Please enter a search value.";
            return;
        }

        let url = "";

        if (searchType === "name") {
            url = "http://localhost:8080/tutors/search/name?name=" + encodeURIComponent(searchValue);
        } else if (searchType === "subject") {
            url = "http://localhost:8080/tutors/search/subject?subject=" + encodeURIComponent(searchValue);
        } else if (searchType === "type") {
            url = "http://localhost:8080/tutors/search/type?tutorType=" + encodeURIComponent(searchValue);
        }

        fetch(url)
            .then(response => response.json())
            .then(data => displayTutors(data))
            .catch(error => {
                document.getElementById("message").style.color = "red";
                document.getElementById("message").innerText = "Search failed.";
            });
    }

    function displayTutors(tutors) {
        const tableBody = document.getElementById("tutorTableBody");
        tableBody.innerHTML = "";

        if (tutors.length === 0) {
            document.getElementById("message").style.color = "red";
            document.getElementById("message").innerText = "No tutors found.";
            return;
        }

        document.getElementById("message").innerText = "";

        tutors.forEach(tutor => {
            const row = `
                <tr>
                    <td>${tutor.tutorId}</td>
                    <td>${tutor.name || ""}</td>
                    <td>${tutor.email || ""}</td>
                    <td>${tutor.phone || ""}</td>
                    <td>${tutor.subject || ""}</td>
                    <td>${tutor.qualification || ""}</td>
                    <td>${tutor.experienceYears}</td>
                    <td>${tutor.hourlyRate}</td>
                    <td>${tutor.availability || ""}</td>
                    <td>${tutor.tutorType || ""}</td>
                    <td>
                        <a class="button update-btn" href="update-tutor.html?id=${tutor.tutorId}">Update</a>
                        <button class="delete-btn" onclick="deleteTutor(${tutor.tutorId})">Delete</button>
                    </td>
                </tr>
            `;

            tableBody.innerHTML += row;
        });
    }

    function deleteTutor(id) {
        const confirmDelete = confirm("Are you sure you want to delete this tutor?");

        if (!confirmDelete) {
            return;
        }

        fetch("http://localhost:8080/tutors/" + id, {
            method: "DELETE"
        })
        .then(response => {
            if (!response.ok) {
                throw new Error("Failed to delete tutor");
            }

            document.getElementById("message").style.color = "green";
            document.getElementById("message").innerText = "Tutor deleted successfully!";
            loadTutors();
        })
        .catch(error => {
            document.getElementById("message").style.color = "red";
            document.getElementById("message").innerText = "Error deleting tutor.";
        });
    }
</script>

</body>
</html>
