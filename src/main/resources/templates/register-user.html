<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Register User</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #dbeafe, #e0f2fe);
            color: #0f172a;
        }

        .page {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            background: white;
            width: 460px;
            padding: 35px;
            border-radius: 18px;
            box-shadow: 0 15px 35px rgba(15, 23, 42, 0.12);
        }

        small {
            color: #0ea5e9;
            font-weight: 900;
        }

        h1 {
            margin: 10px 0 25px;
            font-size: 32px;
        }

        label {
            font-weight: 800;
            display: block;
            margin-bottom: 8px;
        }

        input {
            width: 100%;
            padding: 14px;
            border: 1px solid #cbd5e1;
            border-radius: 12px;
            margin-bottom: 18px;
            font-size: 15px;
        }

        input:focus {
            outline: none;
            border-color: #2563eb;
        }

        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: #2563eb;
            color: white;
            font-weight: 900;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #1d4ed8;
        }

        .back {
            display: block;
            margin-top: 18px;
            text-align: center;
            text-decoration: none;
            color: #2563eb;
            font-weight: 800;
        }
    </style>
</head>

<body>

<div class="page">
    <div class="card">
        <small>USER MANAGEMENT</small>
        <h1>Register User</h1>

        <form th:action="@{/users/save}" th:object="${user}" method="post">
            <label>Name</label>
            <input type="text" th:field="*{name}" placeholder="Enter full name" required>

            <label>Email</label>
            <input type="email" th:field="*{email}" placeholder="Enter email address" required>

            <label>Password</label>
            <input type="password" th:field="*{password}" placeholder="Enter password" required>

            <button type="submit">
                <i class="fa-solid fa-plus"></i> Register User
            </button>
        </form>

        <a href="/users" class="back">
            <i class="fa-solid fa-arrow-left"></i> Back to Users
        </a>
    </div>
</div>

</body>
</html>
